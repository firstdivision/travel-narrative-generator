name: Rewrite travel narrative
run-name: Rewrite narrative from notes update

on:
  push:
    branches: [main]
    paths:
      - "public/travel/notes.md"

permissions:
  contents: write

jobs:
  rewrite:
    name: Generate and commit rewritten narrative
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OpenAI SDK
        run: npm install openai

      - name: Generate narrative
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node .github/scripts/rewrite-travel.mjs

      - name: Commit updated narrative
        run: |
          TARGET_BRANCH="gpt-rewrite"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cp public/travel/narrative.md /tmp/narrative.md

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" > /dev/null; then
            git fetch origin "$TARGET_BRANCH:$TARGET_BRANCH"
            git switch "$TARGET_BRANCH"
          else
            git switch -c "$TARGET_BRANCH"
          fi

          cp /tmp/narrative.md public/travel/narrative.md

          git add public/travel/narrative.md

          if git diff --cached --quiet; then
            echo "No narrative changes to commit"
            exit 0
          fi

          git commit -m "Update travel narrative"
          git push --set-upstream origin "$TARGET_BRANCH"