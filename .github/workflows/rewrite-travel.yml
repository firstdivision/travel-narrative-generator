name: Rewrite travel narrative

on:
  push:
    branches: [main]
    paths:
      - "travel/notes.md"
      - "travel/style.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rewrite:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OpenAI SDK
        run: npm install openai

      - name: Generate narrative
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node .github/scripts/rewrite-travel.mjs

      - name: Commit updated narrative
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add travel/narrative.md
          git diff --cached --quiet || git commit -m "Update travel narrative"
          git push