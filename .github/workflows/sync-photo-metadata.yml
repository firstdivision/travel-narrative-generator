name: "Sync photo metadata"
run-name: Refresh photo indexes and manifest

"on":
  push:
    branches:
      - main
    paths:
      - "public/travel/photos/**/*.jpg"
      - "public/travel/photos/**/*.jpeg"
      - "public/travel/photos/**/*.png"
      - "public/travel/photos/**/*.webp"
      - "public/travel/photos/**/*.avif"
      - "public/travel/photos/**/*.gif"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Generate photo indexes and manifest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Regenerate photo metadata
        run: |
          node scripts/generate-photo-indexes.js
          node scripts/generate-narrative-manifest.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/travel/photos/*/index.json
          git add public/travel/narrative/manifest.json

          if git diff --cached --quiet; then
            echo "No generated metadata changes to commit"
            exit 0
          fi

          git commit -m "Refresh photo indexes and manifest"
          git push origin HEAD:main